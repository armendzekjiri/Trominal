openapi: 3.1.0
info:
  title: Trominal API
  version: 0.1.0
  license:
    name: AGPL-3.0-only
servers:
  - url: http://127.0.0.1:8001
paths:
  /api/server-info:
    get:
      summary: Get public instance registration and feature information.
      responses:
        '200':
          description: Server information.
  /api/health:
    get:
      summary: Get basic health checks for the API, database, and Redis.
      responses:
        '200':
          description: Health status.
  /api/v1/auth/register:
    post:
      summary: Register a user and bootstrap first-user admin mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered with access and refresh tokens.
        '403':
          description: Registration is closed.
        '422':
          description: Validation failed.
  /api/v1/auth/login:
    post:
      summary: Log in with login password and optional TOTP code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens.
        '422':
          description: Invalid credentials or TOTP code.
  /api/v1/auth/refresh:
    post:
      summary: Rotate a refresh token and issue a new token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                device_name:
                  type: string
      responses:
        '200':
          description: New token pair.
        '422':
          description: Invalid refresh token.
  /api/v1/auth/logout:
    post:
      summary: Revoke the current access token and active refresh tokens.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out.
        '401':
          description: Unauthenticated.
  /api/v1/me:
    get:
      summary: Get the authenticated user with roles and permissions.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
        '401':
          description: Unauthenticated.
  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset link without disclosing account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Request accepted.
  /api/v1/auth/reset-password:
    post:
      summary: Reset the login password with a reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                password:
                  type: string
                  minLength: 12
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Password reset.
        '422':
          description: Invalid token or validation failed.
  /api/v1/auth/two-factor/enable:
    post:
      summary: Start TOTP setup and return the secret and otpauth URI.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP setup payload.
        '401':
          description: Unauthenticated.
  /api/v1/auth/two-factor/verify:
    post:
      summary: Confirm TOTP setup with a six-digit code.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP enabled.
        '422':
          description: Invalid code.
  /api/v1/auth/two-factor/disable:
    post:
      summary: Disable TOTP after password and code confirmation.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP disabled.
        '422':
          description: Invalid password or code.
  /api/v1/vault/sync:
    get:
      summary: Delta sync encrypted vault records visible to the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Return records updated or soft-deleted after this timestamp.
      responses:
        '200':
          description: Encrypted vault changes grouped by resource type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultSyncResponse'
        '401':
          description: Unauthenticated.
  /api/v1/vault/{resource}:
    get:
      summary: List encrypted vault records for one resource type.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/TeamScope'
      responses:
        '200':
          description: Vault records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultListResponse'
        '403':
          description: Missing permission.
    post:
      summary: Create an encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultRecordPayload'
      responses:
        '201':
          description: Vault record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission.
        '422':
          description: Validation failed.
  /api/v1/vault/{resource}/{id}:
    get:
      summary: Read one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      responses:
        '200':
          description: Vault record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
    patch:
      summary: Update one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultRecordPayload'
      responses:
        '200':
          description: Vault record updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
        '422':
          description: Validation failed.
    delete:
      summary: Soft-delete one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      responses:
        '204':
          description: Vault record soft-deleted.
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
  /api/v1/teams/users/lookup:
    get:
      summary: Look up a user public key by email for team-key wrapping.
      security:
        - bearerAuth: []
      parameters:
        - name: email
          in: query
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: User public key material.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: '#/components/schemas/TeamUserKey'
        '403':
          description: Missing team invite permission.
        '404':
          description: User not found or suspended.
  /api/v1/teams:
    get:
      summary: List encrypted teams where the authenticated user is a member.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Teams visible to the current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamListResponse'
        '403':
          description: Missing team read permission.
    post:
      summary: Create an encrypted team and attach the current user as owner.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
      responses:
        '201':
          description: Team created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '403':
          description: Missing team create permission.
        '422':
          description: Validation failed.
  /api/v1/teams/{team_id}:
    get:
      summary: Read one encrypted team with members.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '403':
          description: Missing permission or not a team member.
        '404':
          description: Team not found.
    patch:
      summary: Update encrypted team metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamUpdateRequest'
      responses:
        '200':
          description: Team updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
        '403':
          description: Missing permission or not a team owner/admin.
        '422':
          description: Validation failed.
    delete:
      summary: Delete a team. Only team owners may delete teams.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '204':
          description: Team deleted.
        '403':
          description: Missing permission or not a team owner.
        '404':
          description: Team not found.
  /api/v1/teams/{team_id}/members:
    get:
      summary: List members of one team with public key metadata.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
      responses:
        '200':
          description: Team members.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberListResponse'
        '403':
          description: Missing permission or not a team member.
    post:
      summary: Add a team member with their wrapped team key.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberCreateRequest'
      responses:
        '201':
          description: Team member added.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '403':
          description: Missing permission or not a team owner/admin.
        '422':
          description: Validation failed.
  /api/v1/teams/{team_id}/members/{member_id}:
    patch:
      summary: Change a team member role.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/TeamMemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberUpdateRequest'
      responses:
        '200':
          description: Team member role updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMemberResponse'
        '403':
          description: Missing permission or not allowed to assign the requested role.
        '422':
          description: Validation failed.
    delete:
      summary: Remove a team member after key rotation.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/TeamId'
        - $ref: '#/components/parameters/TeamMemberId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamMemberRemoveRequest'
      responses:
        '204':
          description: Team member removed and team key version rotated.
        '403':
          description: Missing permission or not a team owner/admin.
        '422':
          description: Validation failed.
  /api/v1/me/master-password/change:
    post:
      summary: Atomically rotate all encrypted vault material after a client-side master-password change.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MasterPasswordChangeRequest'
      responses:
        '200':
          description: Vault version bumped and other sessions invalidated.
          content:
            application/json:
              schema:
                type: object
                required: [vault_version]
                properties:
                  vault_version:
                    type: integer
        '401':
          description: Unauthenticated.
        '422':
          description: Validation failed.
  /api/v1/ws/ssh-token:
    post:
      summary: Create a short-lived WebSocket SSH token for an owned host.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshTokenRequest'
      responses:
        '201':
          description: Single-use SSH WebSocket token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTokenResponse'
        '403':
          description: Missing hosts.connect permission or web SSH disabled.
        '422':
          description: Host does not belong to the authenticated user.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    VaultResource:
      name: resource
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/VaultResourceType'
    VaultRecordId:
      name: id
      in: path
      required: true
      schema:
        type: string
    TeamScope:
      name: team
      in: query
      required: false
      schema:
        type: string
      description: Optional team ID. Omit for personal vault records.
    TeamId:
      name: team_id
      in: path
      required: true
      schema:
        type: string
    TeamMemberId:
      name: member_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - password_confirmation
        - kdf_salt
        - kdf_params
        - public_key
        - private_key_ciphertext
        - private_key_nonce
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        password_confirmation:
          type: string
        kdf_salt:
          type: string
        kdf_params:
          type: object
        public_key:
          type: string
        private_key_ciphertext:
          type: string
        private_key_nonce:
          type: string
        device_name:
          type: string
        invite_code:
          type: string
          description: Required when server registration mode is invite.
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        two_factor_code:
          type: string
          pattern: "^\\d{6}$"
        device_name:
          type: string
    TeamRole:
      type: string
      enum: [owner, admin, member, viewer]
    TeamUserKey:
      type: object
      required: [id, name, email, public_key]
      properties:
        id:
          type: string
        name:
          type:
            - string
            - 'null'
        email:
          type: string
          format: email
        public_key:
          type: string
    TeamMember:
      type: object
      required:
        - id
        - team_id
        - user_id
        - role
        - wrapped_team_key_ciphertext
        - wrapped_team_key_nonce
        - key_version
        - created_at
        - updated_at
      properties:
        id:
          type: string
        team_id:
          type: string
        user_id:
          type: string
        role:
          $ref: '#/components/schemas/TeamRole'
        wrapped_team_key_ciphertext:
          type: string
          description: Client-side wrapped team key for this member.
        wrapped_team_key_nonce:
          type: string
        key_version:
          type: integer
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
        user:
          $ref: '#/components/schemas/TeamUserKey'
    Team:
      type: object
      required:
        - id
        - name_ciphertext
        - name_nonce
        - key_version
        - current_member
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name_ciphertext:
          type: string
        name_nonce:
          type: string
        key_version:
          type: integer
        current_member:
          $ref: '#/components/schemas/TeamMember'
        members:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
    TeamCreateRequest:
      type: object
      required:
        - name_ciphertext
        - name_nonce
        - wrapped_team_key_ciphertext
        - wrapped_team_key_nonce
      properties:
        id:
          type: string
          description: Optional client-generated ULID used to bind AEAD associated data before create.
        name_ciphertext:
          type: string
        name_nonce:
          type: string
        wrapped_team_key_ciphertext:
          type: string
        wrapped_team_key_nonce:
          type: string
    TeamUpdateRequest:
      type: object
      required: [name_ciphertext, name_nonce]
      properties:
        name_ciphertext:
          type: string
        name_nonce:
          type: string
    TeamMemberCreateRequest:
      type: object
      required:
        - user_id
        - role
        - wrapped_team_key_ciphertext
        - wrapped_team_key_nonce
      properties:
        user_id:
          type: string
        role:
          $ref: '#/components/schemas/TeamRole'
        wrapped_team_key_ciphertext:
          type: string
        wrapped_team_key_nonce:
          type: string
    TeamMemberUpdateRequest:
      type: object
      required: [role]
      properties:
        role:
          $ref: '#/components/schemas/TeamRole'
    TeamMemberRemoveRequest:
      type: object
      required: [remaining_members]
      properties:
        remaining_members:
          type: array
          items:
            type: object
            required: [member_id, wrapped_team_key_ciphertext, wrapped_team_key_nonce]
            properties:
              member_id:
                type: string
              wrapped_team_key_ciphertext:
                type: string
              wrapped_team_key_nonce:
                type: string
    TeamResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/Team'
    TeamListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Team'
    TeamMemberResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/TeamMember'
    TeamMemberListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/TeamMember'
    VaultResourceType:
      type: string
      enum:
        - groups
        - hosts
        - host-credentials
        - snippets
        - identities
        - tunnels
        - ai-settings
    VaultRecordPayload:
      type: object
      additionalProperties: true
      description: Encrypted client payload. Ciphertext fields carry base64 XChaCha20-Poly1305 ciphertexts; nonce fields carry base64 24-byte nonces.
      properties:
        id:
          type: string
          description: Optional client-generated ULID used to bind AEAD associated data before create.
        team_id:
          type:
            - string
            - 'null'
          description: Optional team scope. Omit or null for personal vault records.
      examples:
        - name_ciphertext: 'base64-ciphertext'
          name_nonce: 'base64-nonce'
          hostname_ciphertext: 'base64-ciphertext'
          hostname_nonce: 'base64-nonce'
    VaultRecord:
      type: object
      required: [id, type, created_at, updated_at, deleted_at]
      additionalProperties: true
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/VaultResourceType'
        team_id:
          type:
            - string
            - 'null'
          description: Present on team-scoped vault resource types. Null means personal scope.
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
        deleted_at:
          type:
            - string
            - 'null'
          format: date-time
    VaultRecordResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/VaultRecord'
    VaultListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VaultRecord'
    VaultSyncResponse:
      type: object
      required: [cursor, vault_version, data]
      properties:
        cursor:
          type: string
          format: date-time
        vault_version:
          type: integer
        data:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/VaultRecord'
    MasterPasswordChangeRequest:
      type: object
      required: [new_kdf_salt, new_kdf_params, current_refresh_token, items]
      properties:
        new_kdf_salt:
          type: string
        new_kdf_params:
          type: object
        current_refresh_token:
          type: string
        items:
          type: array
          items:
            type: object
            required: [type, id, fields]
            properties:
              type:
                $ref: '#/components/schemas/VaultResourceType'
              id:
                type: string
              fields:
                $ref: '#/components/schemas/VaultRecordPayload'
    SshTokenRequest:
      type: object
      required: [host_id]
      properties:
        host_id:
          type: string
    SshTokenResponse:
      type: object
      required: [token, expires_at, websocket_url]
      properties:
        token:
          type: string
          description: Plain token shown once; server stores only a SHA-256 hash.
        expires_at:
          type: string
          format: date-time
        websocket_url:
          type: string
