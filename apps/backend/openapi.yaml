openapi: 3.1.0
info:
  title: Trominal API
  version: 0.1.0
  license:
    name: AGPL-3.0-only
servers:
  - url: http://127.0.0.1:8001
paths:
  /api/server-info:
    get:
      summary: Get public instance registration and feature information.
      responses:
        '200':
          description: Server information.
  /api/health:
    get:
      summary: Get basic health checks for the API, database, and Redis.
      responses:
        '200':
          description: Health status.
  /api/v1/auth/register:
    post:
      summary: Register a user and bootstrap first-user admin mode.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered with access and refresh tokens.
        '403':
          description: Registration is closed.
        '422':
          description: Validation failed.
  /api/v1/auth/login:
    post:
      summary: Log in with login password and optional TOTP code.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens.
        '422':
          description: Invalid credentials or TOTP code.
  /api/v1/auth/refresh:
    post:
      summary: Rotate a refresh token and issue a new token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refresh_token]
              properties:
                refresh_token:
                  type: string
                device_name:
                  type: string
      responses:
        '200':
          description: New token pair.
        '422':
          description: Invalid refresh token.
  /api/v1/auth/logout:
    post:
      summary: Revoke the current access token and active refresh tokens.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logged out.
        '401':
          description: Unauthenticated.
  /api/v1/me:
    get:
      summary: Get the authenticated user with roles and permissions.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
        '401':
          description: Unauthenticated.
  /api/v1/auth/forgot-password:
    post:
      summary: Request a password reset link without disclosing account existence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '202':
          description: Request accepted.
  /api/v1/auth/reset-password:
    post:
      summary: Reset the login password with a reset token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, token, password, password_confirmation]
              properties:
                email:
                  type: string
                  format: email
                token:
                  type: string
                password:
                  type: string
                  minLength: 12
                password_confirmation:
                  type: string
      responses:
        '200':
          description: Password reset.
        '422':
          description: Invalid token or validation failed.
  /api/v1/auth/two-factor/enable:
    post:
      summary: Start TOTP setup and return the secret and otpauth URI.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP setup payload.
        '401':
          description: Unauthenticated.
  /api/v1/auth/two-factor/verify:
    post:
      summary: Confirm TOTP setup with a six-digit code.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP enabled.
        '422':
          description: Invalid code.
  /api/v1/auth/two-factor/disable:
    post:
      summary: Disable TOTP after password and code confirmation.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP disabled.
        '422':
          description: Invalid password or code.
  /api/v1/vault/sync:
    get:
      summary: Delta sync encrypted vault records visible to the authenticated user.
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Return records updated or soft-deleted after this timestamp.
      responses:
        '200':
          description: Encrypted vault changes grouped by resource type.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultSyncResponse'
        '401':
          description: Unauthenticated.
  /api/v1/vault/{resource}:
    get:
      summary: List encrypted vault records for one resource type.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
      responses:
        '200':
          description: Vault records.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultListResponse'
        '403':
          description: Missing permission.
    post:
      summary: Create an encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultRecordPayload'
      responses:
        '201':
          description: Vault record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission.
        '422':
          description: Validation failed.
  /api/v1/vault/{resource}/{id}:
    get:
      summary: Read one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      responses:
        '200':
          description: Vault record.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
    patch:
      summary: Update one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultRecordPayload'
      responses:
        '200':
          description: Vault record updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultRecordResponse'
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
        '422':
          description: Validation failed.
    delete:
      summary: Soft-delete one encrypted vault record.
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/VaultResource'
        - $ref: '#/components/parameters/VaultRecordId'
      responses:
        '204':
          description: Vault record soft-deleted.
        '403':
          description: Missing permission or not the owner.
        '404':
          description: Vault record not found.
  /api/v1/me/master-password/change:
    post:
      summary: Atomically rotate all encrypted vault material after a client-side master-password change.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MasterPasswordChangeRequest'
      responses:
        '200':
          description: Vault version bumped and other sessions invalidated.
          content:
            application/json:
              schema:
                type: object
                required: [vault_version]
                properties:
                  vault_version:
                    type: integer
        '401':
          description: Unauthenticated.
        '422':
          description: Validation failed.
  /api/v1/ws/ssh-token:
    post:
      summary: Create a short-lived WebSocket SSH token for an owned host.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SshTokenRequest'
      responses:
        '201':
          description: Single-use SSH WebSocket token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SshTokenResponse'
        '403':
          description: Missing hosts.connect permission or web SSH disabled.
        '422':
          description: Host does not belong to the authenticated user.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    VaultResource:
      name: resource
      in: path
      required: true
      schema:
        $ref: '#/components/schemas/VaultResourceType'
    VaultRecordId:
      name: id
      in: path
      required: true
      schema:
        type: string
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - password_confirmation
        - kdf_salt
        - kdf_params
        - public_key
        - private_key_ciphertext
        - private_key_nonce
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 12
        password_confirmation:
          type: string
        kdf_salt:
          type: string
        kdf_params:
          type: object
        public_key:
          type: string
        private_key_ciphertext:
          type: string
        private_key_nonce:
          type: string
        device_name:
          type: string
        invite_code:
          type: string
          description: Required when server registration mode is invite.
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        two_factor_code:
          type: string
          pattern: "^\\d{6}$"
        device_name:
          type: string
    VaultResourceType:
      type: string
      enum:
        - groups
        - hosts
        - host-credentials
        - snippets
        - identities
        - tunnels
        - ai-settings
    VaultRecordPayload:
      type: object
      additionalProperties: true
      description: Encrypted client payload. Ciphertext fields carry base64 XChaCha20-Poly1305 ciphertexts; nonce fields carry base64 24-byte nonces.
      properties:
        id:
          type: string
          description: Optional client-generated ULID used to bind AEAD associated data before create.
      examples:
        - name_ciphertext: 'base64-ciphertext'
          name_nonce: 'base64-nonce'
          hostname_ciphertext: 'base64-ciphertext'
          hostname_nonce: 'base64-nonce'
    VaultRecord:
      type: object
      required: [id, type, created_at, updated_at, deleted_at]
      additionalProperties: true
      properties:
        id:
          type: string
        type:
          $ref: '#/components/schemas/VaultResourceType'
        created_at:
          type:
            - string
            - 'null'
          format: date-time
        updated_at:
          type:
            - string
            - 'null'
          format: date-time
        deleted_at:
          type:
            - string
            - 'null'
          format: date-time
    VaultRecordResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/VaultRecord'
    VaultListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/VaultRecord'
    VaultSyncResponse:
      type: object
      required: [cursor, vault_version, data]
      properties:
        cursor:
          type: string
          format: date-time
        vault_version:
          type: integer
        data:
          type: object
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/VaultRecord'
    MasterPasswordChangeRequest:
      type: object
      required: [new_kdf_salt, new_kdf_params, current_refresh_token, items]
      properties:
        new_kdf_salt:
          type: string
        new_kdf_params:
          type: object
        current_refresh_token:
          type: string
        items:
          type: array
          items:
            type: object
            required: [type, id, fields]
            properties:
              type:
                $ref: '#/components/schemas/VaultResourceType'
              id:
                type: string
              fields:
                $ref: '#/components/schemas/VaultRecordPayload'
    SshTokenRequest:
      type: object
      required: [host_id]
      properties:
        host_id:
          type: string
    SshTokenResponse:
      type: object
      required: [token, expires_at, websocket_url]
      properties:
        token:
          type: string
          description: Plain token shown once; server stores only a SHA-256 hash.
        expires_at:
          type: string
          format: date-time
        websocket_url:
          type: string
