[www]
listen = 9000
; Accept FastCGI connections from Docker network peers such as Caddy.
; PHP-FPM only accepts literal IPs here, not CIDR ranges.
; Omit listen.allowed_clients so Docker network peers can connect.

user = www-data
group = www-data

pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

clear_env = no
catch_workers_output = yes
decorate_workers_output = no
