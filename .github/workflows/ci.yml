name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'phase/**'

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, redis, sodium
          coverage: none

      - name: Install Composer dependencies
        working-directory: apps/backend
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        working-directory: apps/backend
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Pint
        working-directory: apps/backend
        run: ./vendor/bin/pint --test

      - name: Larastan
        working-directory: apps/backend
        run: ./vendor/bin/phpstan analyse --memory-limit=1G

      - name: Pest
        working-directory: apps/backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: ./vendor/bin/pest

  client:
    name: Client
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:client

      - name: Typecheck
        run: pnpm typecheck

      - name: Crypto unit tests
        run: pnpm --filter @trominal/crypto test

      - name: Client unit tests
        run: pnpm test:client

      - name: Build web client
        run: pnpm --dir apps/client build

      - name: Check Tauri crate
        working-directory: apps/client/src-tauri
        run: cargo check

  crypto-parity:
    name: Crypto parity (TS ↔ Rust)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            packages/crypto/parity/target
          key: ${{ runner.os }}-cargo-parity-${{ hashFiles('packages/crypto/parity/Cargo.toml') }}

      - name: Run parity tests (RustCrypto vs libsodium fixture)
        run: cargo test --manifest-path packages/crypto/parity/Cargo.toml
