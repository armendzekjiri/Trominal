name: trominal

x-backend-image: &backend-image ${TROMINAL_BACKEND_IMAGE:-trominal-backend:local}
x-backend-env-file: &backend-env-file ${TROMINAL_ENV_FILE:-.env}
x-backend-volumes: &backend-volumes
  - backend-storage:/var/www/html/storage
  - backend-public:/shared/public

services:
  app:
    image: *backend-image
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runtime
      args:
        TROMINAL_BACKEND_VERSION: ${TROMINAL_BACKEND_VERSION:-dev}
    restart: unless-stopped
    env_file:
      - *backend-env-file
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      TROMINAL_WEB_SSH_PROXY_HOST: 0.0.0.0
    volumes: *backend-volumes
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'php artisan about --only=environment >/dev/null 2>&1']
      interval: 30s
      timeout: 10s
      retries: 3

  queue:
    image: *backend-image
    restart: unless-stopped
    env_file:
      - *backend-env-file
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes: *backend-volumes
    depends_on:
      app:
        condition: service_started
    command: ['php', 'artisan', 'queue:work', 'redis', '--sleep=3', '--tries=3', '--timeout=90']

  scheduler:
    image: *backend-image
    restart: unless-stopped
    env_file:
      - *backend-env-file
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes: *backend-volumes
    depends_on:
      app:
        condition: service_started
    command: ['php', 'artisan', 'schedule:work']

  ssh-proxy:
    image: *backend-image
    restart: unless-stopped
    env_file:
      - *backend-env-file
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      TROMINAL_WEB_SSH_PROXY_HOST: 0.0.0.0
    volumes: *backend-volumes
    depends_on:
      app:
        condition: service_started
    command: ['php', 'artisan', 'ssh-proxy:start', '--host=0.0.0.0', '--port=8080']

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-trominal}
      POSTGRES_USER: ${POSTGRES_USER:-trominal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    env_file:
      - *backend-env-file
    ports:
      - '${HTTP_PORT:-80}:80'
      - '${HTTPS_PORT:-443}:443'
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - backend-public:/srv/trominal/public:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      app:
        condition: service_started
      ssh-proxy:
        condition: service_started

volumes:
  backend-storage:
  backend-public:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:
