name: trominal-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: trominal-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: trominal
      POSTGRES_USER: trominal
      POSTGRES_PASSWORD: trominal
    ports:
      - '55432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U trominal -d trominal']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trominal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
  redis-data:
