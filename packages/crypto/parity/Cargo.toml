[package]
name = "trominal-crypto-parity"
version = "0.1.0"
edition = "2021"
publish = false
description = "Cross-language parity test: asserts pure-Rust RFC implementations produce byte-equal output to the @trominal/crypto TS implementation."
license = "AGPL-3.0-only"

[dependencies]
# Argon2id: RustCrypto's pure-Rust impl of RFC 9106 (matches libsodium output).
argon2 = { version = "0.5", default-features = false, features = ["alloc"] }
# XChaCha20-Poly1305-IETF: RustCrypto's pure-Rust impl of the IETF construction
# (matches libsodium's `crypto_aead_xchacha20poly1305_ietf_encrypt`).
chacha20poly1305 = { version = "0.10", default-features = false, features = ["alloc"] }
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[test]]
name = "parity"
path = "tests/parity.rs"

[lib]
path = "src/lib.rs"
