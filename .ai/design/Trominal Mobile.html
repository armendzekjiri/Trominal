<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Trominal Mobile — iOS</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="tokens.css"/>
<style>
  html, body { margin: 0; padding: 0; background: #08070a; color: #e7e2d4; font-family: var(--font-ui); }
  #root { min-height: 100vh; }
  @keyframes blink { 0%, 50% { opacity: 1 } 50.01%, 100% { opacity: 0 } }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body class="tr">
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens-mobile.jsx"></script>

<script type="text/babel" data-presets="react">
const TDC = window.DesignCanvas, TDCS = window.DCSection, TDCA = window.DCArtboard;

const App = () => (
  <TDC
    title="Trominal — iOS app"
    subtitle="Self-hosted SSH client · 10 screens · custom terminal keyboard"
    bg="#08070a"
    zoom={0.7}
  >
    <TDCS id="onboarding" title="Onboarding & lock" subtitle="First-launch and unlock">
      <TDCA id="m-connect" label="01 · Connect to server" width={460} height={920}><Phone><MobileConnect/></Phone></TDCA>
      <TDCA id="m-unlock" label="02 · Vault locked (Face ID)" width={460} height={920}><Phone><MobileUnlock/></Phone></TDCA>
    </TDCS>

    <TDCS id="hosts" title="Hosts" subtitle="Browse, quick-launch, manage">
      <TDCA id="m-hosts" label="03 · Hosts list" width={460} height={920}><Phone><MobileHosts/></Phone></TDCA>
      <TDCA id="m-sheet" label="04 · Host quick-actions sheet" width={460} height={920}><Phone><MobileHostSheet/></Phone></TDCA>
    </TDCS>

    <TDCS id="terminal" title="Terminal" subtitle="Hero feature — custom mobile keyboard">
      <TDCA id="m-term" label="05 · Terminal + custom keyboard" width={460} height={920}><Phone><MobileTerminal/></Phone></TDCA>
      <TDCA id="m-ai" label="06 · Terminal with AI ghost suggestion" width={460} height={920}><Phone><MobileTerminalAi/></Phone></TDCA>
    </TDCS>

    <TDCS id="tools" title="Tools" subtitle="Snippets, files, tunnels">
      <TDCA id="m-snippets" label="07 · Snippets quick-launcher" width={460} height={920}><Phone><MobileSnippets/></Phone></TDCA>
      <TDCA id="m-sftp" label="08 · SFTP browser + transfers" width={460} height={920}><Phone><MobileSFTP/></Phone></TDCA>
      <TDCA id="m-tunnels" label="09 · Tunnels manager" width={460} height={920}><Phone><MobileTunnels/></Phone></TDCA>
    </TDCS>

    <TDCS id="settings" title="Settings">
      <TDCA id="m-settings" label="10 · Settings" width={460} height={920}><Phone><MobileSettings/></Phone></TDCA>
    </TDCS>
  </TDC>
);

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
